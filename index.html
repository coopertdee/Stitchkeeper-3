    share:    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>,

    reset:    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.95"/></svg>,

  return icons[name] || null;
};

// ---- Storage ----
function useLocalData() {
  const [data, setData] = useState(() => {
    try { const s = localStorage.getItem(STORAGE_KEY); return s ? JSON.parse(s) : defaultData; }
    catch { return defaultData; }
  });
  const save = (d) => { setData(d); try { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); } catch {} };
  return [data, save];
}

// ---- Shared UI ----
function Modal({ title, onClose, children, wide = false }) {
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(40,20,50,0.6)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:"1rem"}} onClick={onClose}>
      <div style={{background:"#fefcfa",borderRadius:"1rem",padding:"2rem",maxWidth:wide?780:600,width:"100%",maxHeight:"92vh",overflowY:"auto",boxShadow:"0 20px 60px rgba(0,0,0,0.3)",border:"2px solid #c4a8d4"}} onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"1.5rem"}}>
          <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:"1.4rem",color:"#4a3550",margin:0}}>{title}</h2>
          <button onClick={onClose} style={{background:"none",border:"none",cursor:"pointer",color:"#8a6e9a",padding:"0.25rem"}}><Icon name="close"/></button>
        </div>
        {children}
      </div>
    </div>
  );
}

function Field({ label, children, span = false }) {
  return (
    <div style={{marginBottom:"1rem",gridColumn:span?"1/-1":undefined}}>
      <label style={{display:"block",fontFamily:"'Lora',serif",fontSize:"0.78rem",color:"#8a6e9a",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:"0.35rem"}}>{label}</label>
      {children}
    </div>
  );
}

const inputStyle = {width:"100%",padding:"0.6rem 0.8rem",border:"1.5px solid #d4c2e0",borderRadius:"0.5rem",fontFamily:"'Lora',serif",fontSize:"0.95rem",color:"#2d1f3a",background:"#fefcfa",outline:"none",boxSizing:"border-box"};
const textareaStyle = {...inputStyle, minHeight:72, resize:"vertical"};
const selectStyle = {...inputStyle};

function Btn({ children, onClick, variant="primary", small=false, style:s={} }) {
  const base = {fontFamily:"'Lora',serif",fontSize:small?"0.78rem":"0.93rem",fontWeight:600,padding:small?"0.32rem 0.75rem":"0.62rem 1.3rem",borderRadius:"0.5rem",cursor:"pointer",border:"none",display:"inline-flex",alignItems:"center",gap:"0.4rem",transition:"all 0.15s",...s};
  const v = {primary:{background:"linear-gradient(135deg,#7c5c8a,#a0607a)",color:"#fff",border:"none"},secondary:{background:"#eddff5",color:"#4a3550",border:"1px solid #d4c2e0"},danger:{background:"#c0392b",color:"#fff"},ghost:{background:"transparent",color:"#8a6e9a",border:"1.5px solid #d4c2e0"}};
  return <button onClick={onClick} style={{...base,...v[variant]}}>{children}</button>;
}

function Badge({ children, color="#7c5c8a" }) {
  return <span style={{background:color+"22",color,fontSize:"0.72rem",fontFamily:"'Lora',serif",padding:"0.2rem 0.6rem",borderRadius:"999px",fontWeight:600,border:`1px solid ${color}44`}}>{children}</span>;
}

function SearchBar({ value, onChange }) {
  return (
    <div style={{position:"relative",flex:1,minWidth:160}}>

function EmptyState({ emoji, title, sub }) {
  return (
    <div style={{textAlign:"center",padding:"4rem 2rem",color:"#8a6e9a"}}>
      <div style={{fontSize:"3rem",marginBottom:"1rem"}}>{emoji}</div>
      <div style={{fontFamily:"'Playfair Display',serif",fontSize:"1.2rem",marginBottom:"0.5rem",color:"#4a3550"}}>{title}</div>
      <div style={{fontSize:"0.9rem"}}>{sub}</div>
    </div>
  );
}

function toBase64(file) {
  return new Promise((res,rej) => { const r=new FileReader(); r.onload=()=>res(r.result); r.onerror=rej; r.readAsDataURL(file); });
}

// ===== FABRIC CALCULATOR =====
function FabricCalculator() {
  const swRef = useRef(null);
  const shRef = useRef(null);
  const borderRef = useRef(null);
  const customCtRef = useRef(null);
  const [selectedCt, setSelectedCt] = useState("28");
  const [usingCustom, setUsingCustom] = useState(false);
  const [stitchType, setStitchType] = useState("over1");
  const [result, setResult] = useState(null);

  const COUNTS = ["10","14","16","18","20","22","25","28","32","36","40"];
  const AIDA_COUNTS = new Set(["10","14","16","18","20"]);

  // Convert decimal inches to whole number + nearest 1/8" fraction string
  const toFraction = (val) => {
    const whole = Math.floor(val);
    const dec = val - whole;
    const eighths = Math.round(dec * 8);
    if (eighths === 0) return `${whole}"`;
    if (eighths === 8) return `${whole + 1}"`;
    const fracs = {1:"⅛", 2:"¼", 3:"⅜", 4:"½", 5:"⅝", 6:"¾", 7:"⅞"};
    return whole > 0 ? `${whole} ${fracs[eighths]}"` : `${fracs[eighths]}"`;
  };

  const iStyle = {
    display:"block", width:"100%", padding:"0.65rem 0.9rem",
    border:"1.5px solid #d4c2e0", borderRadius:"0.5rem",
    fontFamily:"Lora, serif", fontSize:"1rem",
    color:"#2d1f3a", background:"#fefcfa",
    outline:"none", boxSizing:"border-box", marginTop:"0.35rem"
  };
  const lStyle = {
    display:"block", fontFamily:"Lora, serif", fontSize:"0.75rem",
    color:"#8a6e9a", textTransform:"uppercase", letterSpacing:"0.08em"
  };
  const stepBadge = {
    width:26, height:26, background:"linear-gradient(135deg,#7c5c8a,#c4758a)",
    color:"#fff", borderRadius:"50%", display:"inline-flex",
    alignItems:"center", justifyContent:"center",
    fontSize:"0.75rem", fontWeight:700, flexShrink:0
  };

  const handleCalculate = () => {
    const sw = swRef.current?.value || "";
    const sh = shRef.current?.value || "";
    const border = borderRef.current?.value || "0";
    const customCt = customCtRef.current?.value || "";
    const rawCt = usingCustom && customCt.trim() ? customCt : selectedCt;
    const w = parseFloat(sw), h = parseFloat(sh);
    const rawC = parseFloat(rawCt), b = parseFloat(border) || 0;
    if (!w || !h || !rawC) { alert("Please fill in Width, Height, and a fabric count."); return; }

    // Use manual stitchType selection (auto-set when count picked, but user can override)
    const effectiveCt = stitchType === "over1" ? rawC : rawC / 2;

    const dw = w / effectiveCt;
    const dh = h / effectiveCt;
    const tw = dw + b * 2;
    const th = dh + b * 2;

    setResult({
      sw, sh, border, rawCt, effectiveCt: effectiveCt.toFixed(1), stitchType,
      dw: dw.toFixed(3), dh: dh.toFixed(3),
      tw: tw.toFixed(3), th: th.toFixed(3),
      dwFrac: toFraction(dw), dhFrac: toFraction(dh),
      twFrac: toFraction(tw), thFrac: toFraction(th),
      dwcm: (dw*2.54).toFixed(1), dhcm: (dh*2.54).toFixed(1),
      twcm: (tw*2.54).toFixed(1), thcm: (th*2.54).toFixed(1),
    });
  };

  const handleReset = () => {
    if (swRef.current) swRef.current.value = "";
    if (shRef.current) shRef.current.value = "";
    if (borderRef.current) borderRef.current.value = "3";
    if (customCtRef.current) customCtRef.current.value = "";
    setSelectedCt("28");
    setUsingCustom(false);
    setStitchType("over1");
    setResult(null);
  };

  return (
    <div>
      <div style={{background:"linear-gradient(135deg,#4a3550,#7c5c8a)",borderRadius:"1rem",padding:"1.5rem 2rem",marginBottom:"1.5rem",color:"#f3edf8",display:"flex",gap:"1rem",alignItems:"center"}}>
        <div style={{width:46,height:46,background:"#c4a8d4",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
          <Icon name="ruler" size={22}/>
        </div>
        <div>
          <h2 style={{margin:0,fontFamily:"Playfair Display,serif",fontSize:"1.3rem"}}>Fabric Size Calculator</h2>
          <div style={{fontSize:"0.8rem",color:"#dcc8f0",marginTop:"0.2rem"}}>Enter stitch count, fabric count, stitch type, and border — results shown in inches with fractions</div>
        </div>
      </div>

      <div style={{background:"#fefcfa",border:"1.5px solid #e2d4e8",borderRadius:"1rem",padding:"1.75rem",marginBottom:"1.25rem"}}>

        {/* Step 1 — stitch count */}
        <div style={{marginBottom:"1.5rem"}}>
          <div style={{fontFamily:"Playfair Display,serif",fontSize:"1rem",color:"#4a3550",marginBottom:"1rem",display:"flex",alignItems:"center",gap:"0.6rem"}}>
            <span style={stepBadge}>1</span> Design Stitch Count
          </div>
          <div style={{display:"flex",gap:"1rem",flexWrap:"wrap"}}>
            <div style={{flex:"1 1 140px"}}>
              <label style={lStyle}>Width (stitches)</label>
              <input ref={swRef} type="text" inputMode="decimal" defaultValue="" placeholder="e.g. 127" style={iStyle}/>
            </div>
            <div style={{flex:"1 1 140px"}}>
              <label style={lStyle}>Height (stitches)</label>
              <input ref={shRef} type="text" inputMode="decimal" defaultValue="" placeholder="e.g. 127" style={iStyle}/>
            </div>
          </div>
        </div>

        <div style={{borderTop:"1px dashed #ddc8ea",marginBottom:"1.5rem"}}/>

        {/* Step 2 — fabric count */}
        <div style={{marginBottom:"1.5rem"}}>
          <div style={{fontFamily:"Playfair Display,serif",fontSize:"1rem",color:"#4a3550",marginBottom:"0.85rem",display:"flex",alignItems:"center",gap:"0.6rem"}}>
            <span style={stepBadge}>2</span> Fabric Count
          </div>
          <div style={{display:"flex",flexWrap:"wrap",gap:"0.4rem",marginBottom:"1rem"}}>
            {COUNTS.map(c=>(
              <button key={c}
                onClick={()=>{ setSelectedCt(c); setUsingCustom(false); if(customCtRef.current) customCtRef.current.value=""; setStitchType(AIDA_COUNTS.has(c) ? "over1" : "over2"); }}
                style={{padding:"0.3rem 0.8rem",borderRadius:"999px",cursor:"pointer",
                  fontFamily:"Lora,serif",fontSize:"0.8rem",fontWeight:600,transition:"all 0.12s",
                  border: !usingCustom && selectedCt===c ? "1.5px solid #7c5c8a" : "1.5px solid #d4c2e0",
                  background: !usingCustom && selectedCt===c ? "#7c5c8a" : "#fefcfa",
                  color: !usingCustom && selectedCt===c ? "#fff" : "#5a4060"}}>
                {c}ct
              </button>
            ))}
          </div>
          <div style={{display:"flex",alignItems:"center",gap:"1.5rem",flexWrap:"wrap"}}>
            <div style={{flex:"0 0 200px"}}>
              <label style={lStyle}>Or type a custom count</label>
              <input ref={customCtRef} type="text" inputMode="decimal"
                defaultValue="" placeholder="e.g. 24, 30, 55…"
                onFocus={()=>setUsingCustom(true)}
                style={{...iStyle, borderColor: usingCustom ? "#7c5c8a" : "#d4c2e0",
                  boxShadow: usingCustom ? "0 0 0 3px rgba(124,92,138,0.18)" : "none"}}
              />
            </div>
            <div style={{fontSize:"0.82rem",fontFamily:"Lora,serif",color:"#8a6e9a",fontStyle:"italic",paddingTop:"1.1rem"}}>
              Active: <strong style={{color:"#7c5c8a",fontStyle:"normal"}}>{usingCustom ? "custom" : selectedCt+"ct"}</strong>
            </div>
          </div>
        </div>

        <div style={{borderTop:"1px dashed #ddc8ea",marginBottom:"1.5rem"}}/>

        {/* Step 3 — stitch type */}
        <div style={{marginBottom:"1.5rem"}}>
          <div style={{fontFamily:"Playfair Display,serif",fontSize:"1rem",color:"#4a3550",marginBottom:"0.85rem",display:"flex",alignItems:"center",gap:"0.6rem"}}>
            <span style={stepBadge}>3</span> Stitch Type
            <span style={{fontSize:"0.75rem",fontFamily:"Lora,serif",color:"#8a6e9a",fontWeight:400,fontStyle:"italic"}}>— auto-set by count, but you can override</span>
          </div>
          <div style={{display:"flex",gap:"0.75rem",flexWrap:"wrap"}}>
            {[
              {val:"over1", label:"Over 1", sub:"Aida — 10, 14, 16, 18, 20ct"},
              {val:"over2", label:"Over 2", sub:"Linen & evenweave — 22ct and up"},
            ].map(opt=>(
              <div key={opt.val} onClick={()=>setStitchType(opt.val)}
                style={{flex:"1 1 180px",padding:"0.85rem 1rem",borderRadius:"0.75rem",cursor:"pointer",transition:"all 0.15s",
                  border: stitchType===opt.val ? "2px solid #7c5c8a" : "2px solid #e2d4e8",
                  background: stitchType===opt.val ? "#f0e8f8" : "#fefcfa"}}>
                <div style={{fontFamily:"Lora,serif",fontWeight:700,fontSize:"0.95rem",color: stitchType===opt.val ? "#7c5c8a" : "#2d1f3a"}}>{opt.label}</div>
                <div style={{fontSize:"0.78rem",color:"#8a6e9a",marginTop:"0.2rem"}}>{opt.sub}</div>
              </div>
            ))}
          </div>
          {stitchType === "over2" && (
            <div style={{marginTop:"0.75rem",fontSize:"0.8rem",fontFamily:"Lora,serif",color:"#7c5c8a",background:"#f0e8f8",padding:"0.6rem 0.9rem",borderRadius:"0.5rem"}}>
              💡 Over two halves the effective count — e.g. 28ct ÷ 2 = <strong>14 stitches per inch</strong>
            </div>
          )}
        </div>

        <div style={{borderTop:"1px dashed #ddc8ea",marginBottom:"1.5rem"}}/>

        {/* Step 4 — border */}
        <div style={{marginBottom:"1.5rem"}}>
          <div style={{fontFamily:"Playfair Display,serif",fontSize:"1rem",color:"#4a3550",marginBottom:"0.85rem",display:"flex",alignItems:"center",gap:"0.6rem"}}>
            <span style={stepBadge}>4</span> Border / Margin
          </div>
          <div style={{display:"flex",gap:"1.5rem",alignItems:"flex-start",flexWrap:"wrap"}}>
            <div style={{flex:"0 0 200px"}}>
              <label style={lStyle}>Border on each side (inches)</label>
              <input ref={borderRef} type="text" inputMode="decimal" defaultValue="3" placeholder="e.g. 3" style={iStyle}/>
            </div>
            <div style={{paddingTop:"1.85rem",fontSize:"0.8rem",fontFamily:"Lora,serif",color:"#8a6e9a",fontStyle:"italic",lineHeight:1.6}}>
              💡 Most stitchers allow 3–4 inches on each side for framing or finishing.
            </div>
          </div>
        </div>

        <div style={{display:"flex",gap:"0.75rem",justifyContent:"flex-end"}}>
          <button onClick={handleReset} style={{fontFamily:"Lora,serif",fontSize:"0.9rem",fontWeight:600,padding:"0.6rem 1.2rem",borderRadius:"0.5rem",cursor:"pointer",background:"transparent",color:"#8a6e9a",border:"1.5px solid #d4c2e0",display:"inline-flex",alignItems:"center",gap:"0.4rem"}}>
            <Icon name="reset" size={14}/> Reset
          </button>
          <button onClick={handleCalculate} style={{fontFamily:"Lora,serif",fontSize:"0.9rem",fontWeight:600,padding:"0.6rem 1.2rem",borderRadius:"0.5rem",cursor:"pointer",background:"linear-gradient(135deg,#7c5c8a,#a0607a)",color:"#fff",border:"none",display:"inline-flex",alignItems:"center",gap:"0.4rem"}}>
            <Icon name="calc" size={14}/> Calculate Fabric Size
          </button>
        </div>
      </div>

      {result && (
        <div style={{background:"linear-gradient(135deg,#f5eef8,#ecddf5)",border:"2px solid #c4a8d4",borderRadius:"1rem",padding:"1.5rem",animation:"fadeIn 0.3s ease"}}>
          <div style={{fontFamily:"Playfair Display,serif",fontSize:"1.1rem",color:"#4a3550",marginBottom:"1.25rem",display:"flex",alignItems:"center",gap:"0.5rem"}}>
            📐 Your Results
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"1rem",marginBottom:"1rem"}}>
            <div style={{background:"#fefcfa",borderRadius:"0.75rem",padding:"1.1rem",border:"1.5px solid #e2d4e8"}}>
              <div style={{fontSize:"0.72rem",fontFamily:"Lora,serif",color:"#8a6e9a",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:"0.4rem"}}>Design Area Only</div>
              <div style={{fontFamily:"Playfair Display,serif",fontSize:"1.6rem",color:"#2d1f3a",fontWeight:700,lineHeight:1.2}}>{result.dwFrac} × {result.dhFrac}</div>
              <div style={{fontSize:"0.8rem",fontFamily:"Lora,serif",color:"#8a6e9a",marginTop:"0.3rem"}}>{result.dwcm} × {result.dhcm} cm</div>
            </div>
            <div style={{background:"linear-gradient(135deg,#7c5c8a,#a0607a)",borderRadius:"0.75rem",padding:"1.1rem"}}>
              <div style={{fontSize:"0.72rem",fontFamily:"Lora,serif",color:"#dcc8f0",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:"0.4rem"}}>✂️ Cut Size (with {result.border}" border)</div>
              <div style={{fontFamily:"Playfair Display,serif",fontSize:"1.6rem",color:"#fff",fontWeight:700,lineHeight:1.2}}>{result.twFrac} × {result.thFrac}</div>
              <div style={{fontSize:"0.8rem",fontFamily:"Lora,serif",color:"#dcc8f0",marginTop:"0.3rem"}}>{result.twcm} × {result.thcm} cm</div>
            </div>
          </div>
          <div style={{background:"rgba(255,255,255,0.65)",borderRadius:"0.6rem",padding:"0.85rem 1rem",fontSize:"0.82rem",fontFamily:"Lora,serif",color:"#5a4060",lineHeight:1.9}}>
            <strong style={{color:"#4a3550"}}>How it's calculated ({result.stitchType === "over2" ? "over two" : "over one"}):</strong><br/>
            {result.stitchType === "over2"
              ? <span>Effective count: {result.rawCt}ct ÷ 2 = <strong>{result.effectiveCt} stitches/inch</strong><br/></span>
              : <span>Effective count: <strong>{result.rawCt} stitches/inch</strong><br/></span>
            }
            Design: {result.sw} ÷ {result.effectiveCt} = <strong>{result.dwFrac}</strong> wide &nbsp;·&nbsp; {result.sh} ÷ {result.effectiveCt} = <strong>{result.dhFrac}</strong> tall<br/>
            Cut size: add {result.border}" each side → <strong>{result.twFrac} × {result.thFrac}</strong>
          </div>
          <div style={{marginTop:"0.75rem",fontSize:"0.77rem",fontFamily:"Lora,serif",color:"#8a6e9a",fontStyle:"italic"}}>
            Results rounded to nearest ⅛" — always add a little extra if in doubt! · Stitch type auto-detected: 10, 14, 16, 18 &amp; 20ct = Aida (over one); all others = evenweave (over two).
          </div>
        </div>
      )}
    </div>
  );
}

function ProgressModal({ p, onSave, onClose }) {
  const [pct, setPct] = useState(p.progressPct||0);
  const [logText, setLogText] = useState("");
  const [hours, setHours] = useState("");
  const log = p.progressLog||[];
  const totalHours = log.reduce((s,e)=>s+(parseFloat(e.hours)||0),0);

  const addEntry = () => {
    if (!logText.trim() && !hours) return;
    const entry = {
      id: Math.random().toString(36).slice(2)+Date.now().toString(36),
      date: new Date().toISOString().slice(0,10),
      hours: hours||"",
      note: logText.trim(),
    };
    onSave({...p, progressPct:pct, progressLog:[entry,...log]});
    setLogText(""); setHours("");
  };

  return (
    <div>
      {/* Progress bar */}
      <div style={{marginBottom:"1.25rem"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"0.4rem"}}>
          <label style={{fontFamily:"'Lora',serif",fontSize:"0.78rem",color:"#8a6e9a",textTransform:"uppercase",letterSpacing:"0.08em"}}>Progress</label>
          <span style={{fontFamily:"'Playfair Display',serif",fontSize:"1.2rem",color:"#4a3550",fontWeight:700}}>{pct}%</span>
        </div>
        <input type="range" min={0} max={100} value={pct} onChange={e=>setPct(Number(e.target.value))}
          style={{width:"100%",accentColor:"#7c5c8a",height:6,cursor:"pointer"}}/>
        <div style={{height:10,background:"#f0e8f8",borderRadius:"999px",overflow:"hidden",marginTop:"0.4rem"}}>
          <div style={{height:"100%",width:`${pct}%`,background:"linear-gradient(90deg,#c4a8d4,#7c5c8a)",borderRadius:"999px",transition:"width 0.3s"}}/>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:"0.72rem",color:"#b89ac8",marginTop:"0.2rem"}}>
          <span>0%</span><span>25%</span><span>50%</span><span>75%</span><span>100%</span>
        </div>
      </div>

      {/* Quick % buttons */}
      <div style={{display:"flex",gap:"0.4rem",flexWrap:"wrap",marginBottom:"1.25rem"}}>
        {[0,10,25,50,75,90,100].map(v=>(
          <button key={v} onClick={()=>setPct(v)}
            style={{padding:"0.25rem 0.6rem",borderRadius:"999px",border:`1.5px solid ${pct===v?"#7c5c8a":"#e2d4e8"}`,background:pct===v?"#7c5c8a":"#fefcfa",color:pct===v?"#fff":"#6a5078",cursor:"pointer",fontFamily:"'Lora',serif",fontSize:"0.8rem",fontWeight:600,transition:"all 0.1s"}}>
            {v}%
          </button>
        ))}
      </div>

      {/* Log entry */}
      <div style={{background:"#f5eef8",borderRadius:"0.75rem",padding:"1rem",marginBottom:"1.25rem"}}>
        <div style={{fontFamily:"'Lora',serif",fontSize:"0.78rem",color:"#8a6e9a",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:"0.6rem"}}>Log a Stitch Session</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr auto",gap:"0.5rem",alignItems:"flex-start"}}>
          <textarea value={logText} onChange={e=>setLogText(e.target.value)}
            placeholder="e.g. Finished the border, started fill stitching on the sky…"
            style={{...textareaStyle,minHeight:60,resize:"vertical"}}/>
          <div style={{display:"flex",flexDirection:"column",gap:"0.4rem",minWidth:90}}>
            <input value={hours} onChange={e=>setHours(e.target.value)} placeholder="Hours"
              style={{...inputStyle,textAlign:"center",padding:"0.4rem 0.5rem",fontSize:"0.85rem"}}/>
            <Btn small onClick={addEntry}>+ Log</Btn>
          </div>
        </div>
      </div>

      {/* Session log */}
      {log.length>0 && (
        <div style={{marginBottom:"1rem"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"0.5rem"}}>
            <div style={{fontFamily:"'Lora',serif",fontSize:"0.78rem",color:"#8a6e9a",textTransform:"uppercase",letterSpacing:"0.08em"}}>Session History</div>
            {totalHours>0 && <Badge color="#7c5c8a">{totalHours.toFixed(1)} hrs total</Badge>}
          </div>
          <div style={{maxHeight:220,overflowY:"auto",display:"flex",flexDirection:"column",gap:"0.4rem"}}>
            {log.map(e=>(
              <div key={e.id} style={{background:"#fefcfa",border:"1px solid #e2d4e8",borderRadius:"0.5rem",padding:"0.5rem 0.75rem",display:"flex",gap:"0.75rem",alignItems:"flex-start"}}>
                <div style={{flexShrink:0,fontSize:"0.75rem",color:"#8a6e9a",fontFamily:"'Lora',serif",minWidth:72}}>{e.date}</div>
                {e.hours && <div style={{flexShrink:0,background:"#e8d8f0",color:"#5a4060",borderRadius:"999px",padding:"0.05rem 0.5rem",fontSize:"0.74rem",fontFamily:"'Lora',serif",fontWeight:600}}>{e.hours}h</div>}
                <div style={{fontSize:"0.83rem",fontFamily:"'Lora',serif",color:"#3d2a50",flex:1}}>{e.note||<span style={{color:"#b89ac8",fontStyle:"italic"}}>session logged</span>}</div>
              </div>
            ))}
          </div>
        </div>
      )}

      <div style={{display:"flex",gap:"0.75rem",justifyContent:"flex-end"}}>
        <Btn variant="ghost" onClick={onClose}>Close</Btn>
        <Btn onClick={()=>onSave({...p,progressPct:pct})}>Save Progress</Btn>
      </div>
    </div>
  );
}

function ChartForm({ initial={}, designerName="", onSave, onClose }) {
  const [f, setF] = useState({
    title:"", purchasedFrom:"", datePurchased:"", dateStitched:"",
    season:"", holiday:"", holidayOther:"", theme:"", themeOther:"",
    notes:"", fileData:null, fileName:null, fileType:null,
    ...initial
  });
  const [dragging, setDragging] = useState(false);
  const fileRef = useRef();
  const u = k => e => setF(p=>({...p,[k]:e.target.value}));

  const handleFile = useCallback(async (file) => {
    if (!file) return;
    const isPdf = file.type==="application/pdf", isImg = file.type.startsWith("image/");
    if (!isPdf && !isImg) { alert("Please upload a PDF or image (JPG, PNG, GIF, WebP)."); return; }
    if (file.size > 5*1024*1024) { alert("File must be under 5MB."); return; }
    const data = await toBase64(file);
    setF(p=>({...p,fileData:data,fileName:file.name,fileType:file.type}));
  }, []);

  const onDrop = useCallback(e=>{e.preventDefault();setDragging(false);handleFile(e.dataTransfer.files[0]);}, [handleFile]);

  const openFile = () => {
    if (!f.fileData) return;
    const w = window.open();
    if (f.fileType==="application/pdf") w.document.write(`<iframe src="${f.fileData}" style="width:100%;height:100vh;border:none;"></iframe>`);
    else w.document.write(`<html><body style="margin:0;background:#111;display:flex;justify-content:center;align-items:flex-start;"><img src="${f.fileData}" style="max-width:100%;display:block;"/></body></html>`);
  };

  const selectStyle2 = {...inputStyle};

  return (
    <div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 1rem"}}>
        <Field label="Chart Title" span><input style={inputStyle} value={f.title} onChange={u("title")} placeholder="e.g. Winter Wonderland"/></Field>
        {designerName && <Field label="Designer" span><div style={{...inputStyle,background:"#f5eef8",color:"#7c5c8a",fontWeight:600,display:"flex",alignItems:"center"}}>{designerName}</div></Field>}
        <Field label="Purchased From"><input style={inputStyle} value={f.purchasedFrom} onChange={u("purchasedFrom")} placeholder="e.g. Stitchery, Etsy"/></Field>
        <Field label="Date Purchased"><input type="date" style={inputStyle} value={f.datePurchased} onChange={u("datePurchased")}/></Field>
        <Field label="Date Stitched"><input type="date" style={inputStyle} value={f.dateStitched} onChange={u("dateStitched")}/></Field>
        <div/>

        {/* Season / Holiday / Theme row */}
        <Field label="Season">
          <select style={selectStyle2} value={f.season} onChange={u("season")}>
            {SEASONS.map(s=><option key={s} value={s}>{s||"— None —"}</option>)}
          </select>
        </Field>

        <Field label="Holiday">
          <select style={selectStyle2} value={f.holiday} onChange={u("holiday")}>
            {HOLIDAYS.map(h=><option key={h} value={h}>{h||"— None —"}</option>)}
          </select>
          {f.holiday==="Other" && <OtherField value={f.holidayOther} onChange={u("holidayOther")} placeholder="e.g. Diwali, Lunar New Year…"/>}
        </Field>

        <Field label="Theme" span>
          <select style={selectStyle2} value={f.theme} onChange={u("theme")}>
            {THEMES.map(t=><option key={t} value={t}>{t||"— None —"}</option>)}
          </select>
          {f.theme==="Other" && <OtherField value={f.themeOther} onChange={u("themeOther")} placeholder="e.g. Cats, Lighthouses, Gnomes…"/>}
        </Field>

            <div onDrop={onDrop} onDragOver={e=>{e.preventDefault();setDragging(true);}} onDragLeave={()=>setDragging(false)}
              onClick={()=>fileRef.current.click()}
              style={{border:`2px dashed ${dragging?"#7c5c8a":"#d4c2e0"}`,borderRadius:"0.75rem",padding:"1.5rem",textAlign:"center",cursor:"pointer",background:dragging?"#f0e8f8":"#fefcfa",transition:"all 0.15s"}}>
              <input ref={fileRef} type="file" accept="application/pdf,image/*" style={{display:"none"}} onChange={e=>handleFile(e.target.files[0])}/>

                <div style={{display:"flex",gap:"0.75rem",color:"#b89ac8"}}><Icon name="pdf" size={28}/><Icon name="image" size={28}/></div>
                <div style={{fontFamily:"'Lora',serif",fontSize:"0.9rem",color:"#5a4060",fontWeight:600}}>Drop a PDF or image here</div>
                <div style={{fontSize:"0.78rem",color:"#8a6e9a"}}>or click to browse · PDF, JPG, PNG, WebP · Max 5MB</div>

            </div>

      </div>
      <div style={{display:"flex",gap:"0.75rem",justifyContent:"flex-end",marginTop:"1.25rem"}}>
        <Btn variant="ghost" onClick={onClose}>Cancel</Btn>
        <Btn onClick={()=>onSave(f)}>Save Chart</Btn>
      </div>
    </div>
  );
}

function ChartCard({ c, onEdit, onDelete }) {

      {c.fileData && c.fileType?.startsWith("image/") && (

function FabricTable({ countRecord, fabrics, onAdd, onUpdate, onDelete, onAddToShop }) {
  const [editingId, setEditingId] = useState(null);
  const [editRow, setEditRow] = useState({});
  const [addingNew, setAddingNew] = useState(false);
  const [newRow, setNewRow] = useState({type:"",brand:"",nameColor:"",width:"",height:"",notes:""});
  const [sortCol, setSortCol] = useState("type");
  const [sortDir, setSortDir] = useState("asc");
  const [fabSearch, setFabSearch] = useState("");

  const uid = () => Math.random().toString(36).slice(2)+Date.now().toString(36);

  const startEdit = (f) => { setEditingId(f.id); setEditRow({...f}); setAddingNew(false); };
  const cancelEdit = () => { setEditingId(null); setEditRow({}); };
  const saveEdit = () => { onUpdate({...editRow}); setEditingId(null); setEditRow({}); };

  const startAdd = () => { setAddingNew(true); setNewRow({type:"",brand:"",nameColor:"",width:"",height:"",notes:""}); setEditingId(null); };
  const cancelAdd = () => setAddingNew(false);
  const saveAdd = () => {
    if(!newRow.type && !newRow.nameColor) return;
    onAdd({...newRow, countId:countRecord.id, id:uid(), createdAt:new Date().toISOString()});
    setNewRow({type:"",brand:"",nameColor:"",width:"",height:"",notes:""});
    setAddingNew(false);
  };

  const toggleSort = (col) => { if(sortCol===col) setSortDir(d=>d==="asc"?"desc":"asc"); else { setSortCol(col); setSortDir("asc"); } };

  const filtered = fabrics.filter(f => {
    if (!fabSearch) return true;
    const s = fabSearch.toLowerCase();
    return (f.type||"").toLowerCase().includes(s) || (f.brand||"").toLowerCase().includes(s) ||
           (f.nameColor||"").toLowerCase().includes(s) || (f.notes||"").toLowerCase().includes(s);
  });

  const sorted = [...filtered].sort((a,b) => {
    const av = a[sortCol]||"", bv = b[sortCol]||"";
    return sortDir==="asc" ? av.localeCompare(bv) : bv.localeCompare(av);
  });

  const thStyle = (col) => ({
    padding:"0.6rem 0.75rem", fontFamily:"'Lora',serif", fontSize:"0.72rem",
    textTransform:"uppercase", letterSpacing:"0.07em", color:"#8a6e9a",
    background:"#f0e8f8", cursor:"pointer", userSelect:"none", whiteSpace:"nowrap",

  const inlineInput = { padding:"0.3rem 0.5rem", border:"1.5px solid #c4a8d4", borderRadius:"0.35rem", fontFamily:"'Lora',serif", fontSize:"0.86rem", color:"#2d1f3a", background:"#faf6ff", width:"100%", boxSizing:"border-box" };
  const SortIcon = ({col}) => <span style={{marginLeft:"0.3rem",opacity:sortCol===col?1:0.3}}>{sortCol===col&&sortDir==="desc"?"↓":"↑"}</span>;

  return (
    <div>
      <div style={{display:"flex",alignItems:"center",gap:"0.75rem",marginBottom:"1rem",flexWrap:"wrap"}}>
        <div style={{position:"relative",flex:1,minWidth:160}}>
          <input value={fabSearch} onChange={e=>setFabSearch(e.target.value)} placeholder="Search fabric..." style={{...inputStyle,paddingLeft:"2rem",fontSize:"0.88rem"}}/>
          <svg style={{position:"absolute",left:"0.65rem",top:"50%",transform:"translateY(-50%)"}} width={13} height={13} viewBox="0 0 24 24" fill="none" stroke="#8a6e9a" strokeWidth="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </div>
        <div style={{fontSize:"0.8rem",fontFamily:"'Lora',serif",color:"#8a6e9a"}}>{sorted.length} piece{sorted.length!==1?"s":""}</div>
        <Btn small onClick={startAdd}><Icon name="plus" size={13}/>Add Fabric</Btn>
      </div>

      <div style={{borderRadius:"0.75rem",overflow:"hidden",border:"1.5px solid #e2d4e8",boxShadow:"0 2px 10px rgba(100,70,130,0.06)"}}>
        <div style={{overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse",minWidth:580}}>
            <thead>
              <tr>
                <th style={thStyle("type")} onClick={()=>toggleSort("type")}>Type <SortIcon col="type"/></th>
                <th style={thStyle("brand")} onClick={()=>toggleSort("brand")}>Brand <SortIcon col="brand"/></th>
                <th style={thStyle("nameColor")} onClick={()=>toggleSort("nameColor")}>Name / Color <SortIcon col="nameColor"/></th>
                <th style={{...thStyle("width"),cursor:"default"}}>Width</th>
                <th style={{...thStyle("height"),cursor:"default"}}>Height</th>

                <th style={{...thStyle(),width:80,cursor:"default"}}>Actions</th>
              </tr>
            </thead>
            <tbody>
              {addingNew && (
                <tr style={{background:"#f5eef8"}}>
                  <td style={tdStyle}><input style={inlineInput} value={newRow.type} onChange={e=>setNewRow(p=>({...p,type:e.target.value}))} placeholder="e.g. Linen" autoFocus/></td>
                  <td style={tdStyle}><input style={inlineInput} value={newRow.brand} onChange={e=>setNewRow(p=>({...p,brand:e.target.value}))} placeholder="e.g. Wichelt"/></td>
                  <td style={tdStyle}><input style={inlineInput} value={newRow.nameColor} onChange={e=>setNewRow(p=>({...p,nameColor:e.target.value}))} placeholder="e.g. Antique White"/></td>
                  <td style={tdStyle}><input style={{...inlineInput,width:70}} value={newRow.width} onChange={e=>setNewRow(p=>({...p,width:e.target.value}))} placeholder={`e.g. 18"`}/></td>
                  <td style={tdStyle}><input style={{...inlineInput,width:70}} value={newRow.height} onChange={e=>setNewRow(p=>({...p,height:e.target.value}))} placeholder={`e.g. 27"`}/></td>

                    <button onClick={cancelAdd} style={{background:"none",color:"#8a6e9a",border:"1px solid #d4c2e0",borderRadius:"0.35rem",padding:"0.28rem 0.6rem",cursor:"pointer",fontFamily:"'Lora',serif",fontSize:"0.78rem"}}>✕</button>

              {sorted.map((f,i) => editingId===f.id ? (

                  <td style={tdStyle}><input style={inlineInput} value={editRow.brand||""} onChange={e=>setEditRow(p=>({...p,brand:e.target.value}))}/></td>
                  <td style={tdStyle}><input style={inlineInput} value={editRow.nameColor||""} onChange={e=>setEditRow(p=>({...p,nameColor:e.target.value}))}/></td>
                  <td style={tdStyle}><input style={{...inlineInput,width:70}} value={editRow.width||""} onChange={e=>setEditRow(p=>({...p,width:e.target.value}))}/></td>
                  <td style={tdStyle}><input style={{...inlineInput,width:70}} value={editRow.height||""} onChange={e=>setEditRow(p=>({...p,height:e.target.value}))}/></td>
                  <td style={tdStyle}><input style={inlineInput} value={editRow.notes||""} onChange={e=>setEditRow(p=>({...p,notes:e.target.value}))}/></td>

                  </td>
                </tr>
              ) : (
                <tr key={f.id} style={{background:i%2===0?"#fefcfa":"#faf6ff",transition:"background 0.1s"}}>
                  <td style={{...tdStyle,fontWeight:600,color:"#4a3550"}}>{f.type||"—"}</td>
                  <td style={tdStyle}>{f.brand||"—"}</td>
                  <td style={tdStyle}>{f.nameColor||"—"}</td>
                  <td style={{...tdStyle,textAlign:"center",color:"#5a4060"}}>{f.width||"—"}</td>
                  <td style={{...tdStyle,textAlign:"center",color:"#5a4060"}}>{f.height||"—"}</td>
                  <td style={{...tdStyle,color:"#6a5870",fontStyle:f.notes?"normal":"italic",fontSize:"0.83rem"}}>{f.notes||<span style={{color:"#ccc"}}>—</span>}</td>

                    <button onClick={()=>startEdit(f)} style={{background:"none",border:"none",cursor:"pointer",color:"#7c5c8a",padding:"0.2rem 0.35rem"}}><Icon name="edit" size={14}/></button>
                    <button onClick={()=>onDelete(f.id)} style={{background:"none",border:"none",cursor:"pointer",color:"#c0392b",padding:"0.2rem 0.35rem"}}><Icon name="trash" size={14}/></button>
                    {onAddToShop && <button title="Add to Shopping List" onClick={()=>onAddToShop({item:`${countRecord.count}ct ${f.type||"Fabric"}${f.nameColor?" – "+f.nameColor:""}`,category:"Fabric",quantity:"1",size:f.width&&f.height?`${f.width}×${f.height}`:"",placeToBuy:"",notes:"",otherCategory:"",bought:false})} style={{background:"none",border:"none",cursor:"pointer",color:"#2e7d32",padding:"0.2rem 0.35rem"}}><Icon name="cart" size={14}/></button>}
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

    textTransform:"uppercase", letterSpacing:"0.07em", color:"#8a6e9a",
    background:"#f0e8f8", cursor:"pointer", userSelect:"none", whiteSpace:"nowrap",
    borderBottom:"2px solid #e2d4e8", textAlign:"left",
    borderRight:"1px solid #e2d4e8"
  });
  const tdStyle = { padding:"0.55rem 0.75rem", borderBottom:"1px solid #f0e8f8", borderRight:"1px solid #f5f0fa", verticalAlign:"middle", fontSize:"0.9rem", color:"#2d1f3a", fontFamily:"'Lora',serif" };
  const inlineInput = { padding:"0.3rem 0.5rem", border:"1.5px solid #c4a8d4", borderRadius:"0.35rem", fontFamily:"'Lora',serif", fontSize:"0.88rem", color:"#2d1f3a", background:"#faf6ff", width:"100%", boxSizing:"border-box" };

  const SortIcon = ({col}) => <span style={{marginLeft:"0.3rem",opacity:sortCol===col?1:0.3}}>{sortCol===col&&sortDir==="desc"?"↓":"↑"}</span>;

  return (
    <div>
      {/* Table toolbar */}
      <div style={{display:"flex",alignItems:"center",gap:"0.75rem",marginBottom:"1rem",flexWrap:"wrap"}}>
        <div style={{position:"relative",flex:1,minWidth:160}}>
          <input value={flossSearch} onChange={e=>setFlossSearch(e.target.value)} placeholder="Search colors..." style={{...inputStyle,paddingLeft:"2rem",fontSize:"0.88rem"}}/>
          <svg style={{position:"absolute",left:"0.65rem",top:"50%",transform:"translateY(-50%)",color:"#9b7b4d"}} width={13} height={13} viewBox="0 0 24 24" fill="none" stroke="#8a6e9a" strokeWidth="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </div>
        <div style={{fontSize:"0.8rem",fontFamily:"'Lora',serif",color:"#8a6e9a"}}>{sorted.length} color{sorted.length!==1?"s":""}</div>
        {lowStockCount > 0 && (
          <div style={{display:"flex",alignItems:"center",gap:"0.3rem",background:"#fff3e0",color:"#e65100",fontSize:"0.78rem",fontFamily:"'Lora',serif",fontWeight:600,padding:"0.25rem 0.65rem",borderRadius:"999px",border:"1px solid #ffcc80"}}>
            <Icon name="warning" size={12}/> {lowStockCount} low stock
          </div>
        )}
        {lowStockCount > 0 && onAddToShop && (
          <button onClick={()=>flosses.filter(x=>x.lowStock).forEach(x=>onAddToShop({item:`${brand.name} ${x.colorNumber}${x.colorName?" – "+x.colorName:""}`,category:"Floss",quantity:"1",size:"",placeToBuy:"",notes:"",otherCategory:"",bought:false}))} style={{background:"#fff3e0",color:"#e65100",border:"1px solid #ffcc80",borderRadius:"999px",padding:"0.25rem 0.65rem",cursor:"pointer",fontFamily:"'Lora',serif",fontSize:"0.75rem",fontWeight:600,display:"flex",alignItems:"center",gap:"0.3rem"}}>
            <Icon name="cart" size={12}/>Add all low stock
          </button>
        )}
        <Btn small onClick={startAdd}><Icon name="plus" size={13}/>Add Color</Btn>
      </div>

      {/* Table */}
      <div style={{borderRadius:"0.75rem",overflow:"hidden",border:"1.5px solid #e2d4e8",boxShadow:"0 2px 10px rgba(100,70,130,0.06)"}}>
        <div style={{overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse",minWidth:520}}>
            <thead>
              <tr>
                <th style={{...thStyle("colorNumber"),width:110}} onClick={()=>toggleSort("colorNumber")}>Color # <SortIcon col="colorNumber"/></th>
                <th style={{...thStyle("colorName")}} onClick={()=>toggleSort("colorName")}>Color Name <SortIcon col="colorName"/></th>
                <th style={{...thStyle("quantity"),width:90}} onClick={()=>toggleSort("quantity")}>Skeins <SortIcon col="quantity"/></th>
                <th style={{...thStyle("lowStock"),width:80,cursor:"default"}}>Low Stock</th>
                <th style={{...thStyle("notes")}}>Notes</th>
                <th style={{...thStyle(),width:80,cursor:"default"}}>Actions</th>
              </tr>
            </thead>
            <tbody>
              {/* Add new row */}
              {addingNew && (
                <tr style={{background:"#f5eef8"}}>
                  <td style={tdStyle}><input style={inlineInput} value={newRow.colorNumber} onChange={e=>setNewRow(p=>({...p,colorNumber:e.target.value}))} placeholder="e.g. 321" autoFocus/></td>
                  <td style={tdStyle}><input style={inlineInput} value={newRow.colorName} onChange={e=>setNewRow(p=>({...p,colorName:e.target.value}))} placeholder="e.g. Christmas Red"/></td>
                  <td style={tdStyle}><input style={{...inlineInput,width:60}} value={newRow.quantity} onChange={e=>setNewRow(p=>({...p,quantity:e.target.value}))} placeholder="1"/></td>
                  <td style={{...tdStyle,textAlign:"center"}}><input type="checkbox" checked={newRow.lowStock} onChange={e=>setNewRow(p=>({...p,lowStock:e.target.checked}))} style={{width:16,height:16,accentColor:"#e65100"}}/></td>
                  <td style={tdStyle}><input style={inlineInput} value={newRow.notes} onChange={e=>setNewRow(p=>({...p,notes:e.target.value}))} placeholder="Notes…"/></td>
                  <td style={{...tdStyle,whiteSpace:"nowrap"}}>
                    <button onClick={saveAdd} style={{background:"#7c5c8a",color:"#fff",border:"none",borderRadius:"0.35rem",padding:"0.28rem 0.6rem",cursor:"pointer",fontFamily:"'Lora',serif",fontSize:"0.78rem",marginRight:"0.3rem"}}>Save</button>
                    <button onClick={cancelAdd} style={{background:"none",color:"#8a6e9a",border:"1px solid #d4c2e0",borderRadius:"0.35rem",padding:"0.28rem 0.6rem",cursor:"pointer",fontFamily:"'Lora',serif",fontSize:"0.78rem"}}>✕</button>
                  </td>
                </tr>
              )}
              {sorted.length === 0 && !addingNew && (
                <tr><td colSpan={6} style={{...tdStyle,textAlign:"center",padding:"2.5rem",color:"#8a6e9a",fontStyle:"italic"}}>No colors yet — click Add Color to get started!</td></tr>
              )}
              {sorted.map((f,i) => editingId===f.id ? (
                <tr key={f.id} style={{background:"#f5eef8"}}>
                  <td style={tdStyle}><input style={inlineInput} value={editRow.colorNumber} onChange={e=>setEditRow(p=>({...p,colorNumber:e.target.value}))} autoFocus/></td>
                  <td style={tdStyle}><input style={inlineInput} value={editRow.colorName} onChange={e=>setEditRow(p=>({...p,colorName:e.target.value}))}/></td>
                  <td style={tdStyle}><input style={{...inlineInput,width:60}} value={editRow.quantity} onChange={e=>setEditRow(p=>({...p,quantity:e.target.value}))}/></td>
                  <td style={{...tdStyle,textAlign:"center"}}><input type="checkbox" checked={!!editRow.lowStock} onChange={e=>setEditRow(p=>({...p,lowStock:e.target.checked}))} style={{width:16,height:16,accentColor:"#e65100"}}/></td>
                  <td style={tdStyle}><input style={inlineInput} value={editRow.notes||""} onChange={e=>setEditRow(p=>({...p,notes:e.target.value}))}/></td>
                  <td style={{...tdStyle,whiteSpace:"nowrap"}}>
                    <button onClick={saveEdit} style={{background:"#7c5c8a",color:"#fff",border:"none",borderRadius:"0.35rem",padding:"0.28rem 0.6rem",cursor:"pointer",fontFamily:"'Lora',serif",fontSize:"0.78rem",marginRight:"0.3rem"}}>Save</button>
                    <button onClick={cancelEdit} style={{background:"none",color:"#8a6e9a",border:"1px solid #d4c2e0",borderRadius:"0.35rem",padding:"0.28rem 0.6rem",cursor:"pointer",fontFamily:"'Lora',serif",fontSize:"0.78rem"}}>✕</button>
                  </td>
                </tr>
              ) : (
                <tr key={f.id} style={{background: f.lowStock ? "#fff8f0" : i%2===0?"#fefcfa":"#faf6ff", transition:"background 0.1s"}}>
                  <td style={{...tdStyle,fontWeight:600,color:"#4a3550"}}>{f.colorNumber||"—"}</td>
                  <td style={tdStyle}>{f.colorName||"—"}</td>
                  <td style={{...tdStyle,textAlign:"center"}}>{f.quantity||"1"}</td>
                  <td style={{...tdStyle,textAlign:"center"}}>
                    {f.lowStock
                      ? <span style={{display:"inline-flex",alignItems:"center",gap:"0.25rem",color:"#e65100",fontSize:"0.75rem",fontWeight:600}}><Icon name="warning" size={13}/>Low</span>
                      : <span style={{color:"#b0c4b1",fontSize:"0.8rem"}}>✓</span>}
                  </td>
                  <td style={{...tdStyle,color:"#6a5870",fontStyle:f.notes?"normal":"italic",fontSize:"0.84rem"}}>{f.notes||<span style={{color:"#ccc"}}>—</span>}</td>
                  <td style={{...tdStyle,whiteSpace:"nowrap"}}>
                    <button onClick={()=>startEdit(f)} style={{background:"none",border:"none",cursor:"pointer",color:"#7c5c8a",padding:"0.2rem 0.35rem",borderRadius:"0.3rem"}}><Icon name="edit" size={14}/></button>
                    <button onClick={()=>onDelete(f.id)} style={{background:"none",border:"none",cursor:"pointer",color:"#c0392b",padding:"0.2rem 0.35rem",borderRadius:"0.3rem"}}><Icon name="trash" size={14}/></button>
                    {onAddToShop && <button title="Add to Shopping List" onClick={()=>onAddToShop({item:`${brand.name} ${f.colorNumber}${f.colorName?" – "+f.colorName:""}`,category:"Floss",quantity:"1",size:"",placeToBuy:"",notes:"",otherCategory:"",bought:false})} style={{background:"none",border:"none",cursor:"pointer",color:"#2e7d32",padding:"0.2rem 0.35rem",borderRadius:"0.3rem"}}><Icon name="cart" size={14}/></button>}
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

// ===== SHOPPING LIST =====
const SHOP_CATS = ["Chart","Fabric","Floss","Needles","Finishing Fabric","Notions","Other"];
const SHOP_PLACES = ["","123 Stitch","Etsy","FQS","Primrose Cottage","Stitchery","Needle in a Haystack","Nordic Needle","Hobby Lobby","Michael's","Amazon","Designer Website","Other"];
const SHOP_CAT_COLOR = {"Chart":"#7c5c8a","Fabric":"#2e7d32","Floss":"#c4758a","Needles":"#1565c0","Finishing Fabric":"#6a8f6a","Notions":"#b8520a","Other":"#6a5078"};

function ShoppingTab({ shoppingList, onSave }) {
  const [shopSearch, setShopSearch] = useState("");
  const [catFilter, setCatFilter] = useState("");
  const [showBought, setShowBought] = useState(false);
  const [editingId, setEditingId] = useState(null);
  const [editRow, setEditRow] = useState({});
  const [addingNew, setAddingNew] = useState(false);
  const [newRow, setNewRow] = useState({item:"",category:"Floss",otherCategory:"",quantity:"1",size:"",placeToBuy:"",notes:"",bought:false});

  const uid = () => Math.random().toString(36).slice(2)+Date.now().toString(36);
  const save = (list) => onSave(list);
  const addItem   = (row) => save([...shoppingList, {...row, id:uid(), createdAt:new Date().toISOString()}]);
  const updateItem = (row) => save(shoppingList.map(x=>x.id===row.id?row:x));
  const deleteItem = (id)  => save(shoppingList.filter(x=>x.id!==id));
  const toggleBought = (id) => save(shoppingList.map(x=>x.id===id?{...x,bought:!x.bought}:x));

  // ── Export helpers ──
  const toBuyList = shoppingList.filter(x=>!x.bought);

  const buildTextList = () => {
    if (toBuyList.length===0) return "Shopping list is empty!";
    // Group by store
    const byStore = {};
    toBuyList.forEach(x => {
      const store = x.placeToBuy||"No store specified";
      if (!byStore[store]) byStore[store] = [];
      byStore[store].push(x);
    });
    const lines = ["🛒 StitchKeeper Shopping List", "─".repeat(30)];
    Object.entries(byStore).forEach(([store, items]) => {
      lines.push("\n📍 " + store.toUpperCase());
      items.forEach(x => {
        const cat  = x.category==="Other"&&x.otherCategory ? x.otherCategory : x.category;
        const qty  = x.quantity && x.quantity!=="1" ? ` ×${x.quantity}` : "";
        const size = x.size ? ` (${x.size})` : "";
        const note = x.notes ? ` — ${x.notes}` : "";
        lines.push(`  • [${cat}] ${x.item}${qty}${size}${note}`);
      });
    });
    lines.push("\n─".repeat(15));
    lines.push(`${toBuyList.length} item${toBuyList.length!==1?"s":""} to buy`);
    return lines.join("\n");
  };

  const shareAsText = async () => {
    const text = buildTextList();
    // Try native share (works on mobile — opens Messages, WhatsApp, etc.)
    if (navigator.share) {
      try { await navigator.share({ title:"Shopping List", text }); return; } catch(e) {}
    }
    // Fallback: copy to clipboard
    try {
      await navigator.clipboard.writeText(text);
      alert("Shopping list copied to clipboard!\nPaste it into a text message or email.");
    } catch(e) {
      // Final fallback: show in a textarea for manual copy
      const w = window.open("","_blank","width=500,height=600");
      w.document.write(`<html><body style="font-family:monospace;padding:1rem;white-space:pre-wrap;background:#f9f5fc;">${text.replace(/</g,"&lt;")}</body></html>`);
    }
  };

  const emailList = () => {
    if (toBuyList.length===0) { alert("Nothing to buy yet!"); return; }
    const text = buildTextList();
    const date = new Date().toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"});
    const subject = encodeURIComponent(`StitchKeeper Shopping List — ${date}`);
    // mailto: body — encode the plain text list
    const body = encodeURIComponent(text);
    // mailto: URI — opens default mail app with subject + body pre-filled
    window.location.href = `mailto:?subject=${subject}&body=${body}`;
  };

  const exportPDF = () => {
    if (toBuyList.length===0) { alert("Nothing to buy yet!"); return; }
    const byStore = {};
    toBuyList.forEach(x => {
      const store = x.placeToBuy||"No store specified";
      if (!byStore[store]) byStore[store] = [];
      byStore[store].push(x);
    });
    const byCategory = {};
    toBuyList.forEach(x => {
      const cat = x.category==="Other"&&x.otherCategory?x.otherCategory:x.category;
      if (!byCategory[cat]) byCategory[cat] = [];
      byCategory[cat].push(x);
    });
    const date = new Date().toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"});
    const catColors = {"Chart":"#7c5c8a","Fabric":"#2e7d32","Floss":"#c4758a","Needles":"#1565c0","Finishing Fabric":"#6a8f6a","Notions":"#b8520a","Other":"#6a5078"};

    const storeRows = Object.entries(byStore).map(([store,items])=>`
      <div style="margin-bottom:1.4rem;">
        <div style="background:#4a3550;color:#fff;padding:0.45rem 0.85rem;border-radius:0.4rem 0.4rem 0 0;font-size:0.82rem;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;">📍 ${store}</div>
        <table style="width:100%;border-collapse:collapse;border:1px solid #e2d4e8;border-top:none;">
          <thead><tr style="background:#f0e8f8;">
            <th style="padding:0.4rem 0.6rem;font-size:0.72rem;text-align:left;border-right:1px solid #e2d4e8;">Category</th>
            <th style="padding:0.4rem 0.6rem;font-size:0.72rem;text-align:left;border-right:1px solid #e2d4e8;">Item</th>
            <th style="padding:0.4rem 0.6rem;font-size:0.72rem;text-align:center;border-right:1px solid #e2d4e8;">Qty</th>
            <th style="padding:0.4rem 0.6rem;font-size:0.72rem;text-align:left;border-right:1px solid #e2d4e8;">Size</th>
            <th style="padding:0.4rem 0.6rem;font-size:0.72rem;text-align:left;">Notes</th>
          </tr></thead>
          <tbody>${items.map((x,i)=>{
            const cat=x.category==="Other"&&x.otherCategory?x.otherCategory:x.category;
            const col=catColors[x.category]||"#7c5c8a";
            return `<tr style="background:${i%2===0?"#fefcfa":"#faf6ff"};">
              <td style="padding:0.4rem 0.6rem;border-right:1px solid #f0e8f8;"><span style="background:${col}22;color:${col};padding:0.1rem 0.5rem;border-radius:999px;font-size:0.72rem;font-weight:600;">${cat}</span></td>
              <td style="padding:0.4rem 0.6rem;border-right:1px solid #f0e8f8;font-weight:600;font-size:0.85rem;">${x.item||""}</td>
              <td style="padding:0.4rem 0.6rem;border-right:1px solid #f0e8f8;text-align:center;font-size:0.85rem;">${x.quantity||"1"}</td>
              <td style="padding:0.4rem 0.6rem;border-right:1px solid #f0e8f8;font-size:0.82rem;color:#5a4060;">${x.size||"—"}</td>
              <td style="padding:0.4rem 0.6rem;font-size:0.82rem;color:#6a5078;font-style:italic;">${x.notes||""}</td>
            </tr>`;
          }).join("")}</tbody>
        </table>
      </div>`).join("");

    const html = `<!DOCTYPE html><html><head><meta charset="utf-8">
      <title>StitchKeeper Shopping List</title>
      <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lora:wght@400;500;600&display=swap');
        body { font-family:'Lora',serif; margin:0; padding:2rem; background:#fff; color:#2d1f3a; max-width:800px; margin:0 auto; }
        @media print { body { padding:0.5rem; } .no-print { display:none; } }
      </style>
    </head><body>
      <div style="text-align:center;margin-bottom:2rem;padding-bottom:1rem;border-bottom:2px solid #e2d4e8;">
        <div style="font-family:'Playfair Display',serif;font-size:1.8rem;color:#4a3550;font-weight:700;">🧵 StitchKeeper</div>
        <div style="font-size:1rem;color:#8a6e9a;margin-top:0.25rem;">Shopping List · ${date}</div>
        <div style="font-size:0.85rem;color:#b89ac8;margin-top:0.15rem;">${toBuyList.length} item${toBuyList.length!==1?"s":""} to buy</div>
      </div>
      <h2 style="font-family:'Playfair Display',serif;color:#4a3550;font-size:1.1rem;margin-bottom:1rem;">By Store</h2>
      ${storeRows}
      <div class="no-print" style="text-align:center;margin-top:2rem;">
        <button onclick="window.print()" style="background:linear-gradient(135deg,#7c5c8a,#a0607a);color:#fff;border:none;padding:0.75rem 2rem;border-radius:0.5rem;font-family:'Lora',serif;font-size:1rem;cursor:pointer;font-weight:600;">🖨️ Print / Save as PDF</button>
      </div>
    </body></html>`;

    const w = window.open("","_blank");
    w.document.write(html);
    w.document.close();
  };

  const all = shoppingList;
  const filtered = all.filter(x => {
    if (!showBought && x.bought) return false;
    if (catFilter && x.category!==catFilter) return false;
    if (shopSearch) { const s=shopSearch.toLowerCase(); return (x.item||"").toLowerCase().includes(s)||(x.placeToBuy||"").toLowerCase().includes(s)||(x.notes||"").toLowerCase().includes(s)||(x.otherCategory||"").toLowerCase().includes(s); }
    return true;
  });
  const toBuy  = all.filter(x=>!x.bought).length;
  const bought = all.filter(x=>x.bought).length;

  const thS = {padding:"0.6rem 0.75rem",fontFamily:"'Lora',serif",fontSize:"0.72rem",textTransform:"uppercase",letterSpacing:"0.07em",color:"#8a6e9a",background:"#f0e8f8",whiteSpace:"nowrap",borderBottom:"2px solid #e2d4e8",textAlign:"left",borderRight:"1px solid #e2d4e8"};
  const tdS = {padding:"0.55rem 0.75rem",borderBottom:"1px solid #f0e8f8",borderRight:"1px solid #f5f0fa",verticalAlign:"middle",fontSize:"0.88rem",color:"#2d1f3a",fontFamily:"'Lora',serif"};
  const inpS = {padding:"0.3rem 0.5rem",border:"1.5px solid #c4a8d4",borderRadius:"0.35rem",fontFamily:"'Lora',serif",fontSize:"0.86rem",color:"#2d1f3a",background:"#faf6ff",width:"100%",boxSizing:"border-box"};

  return (
    <div>
      <div style={{display:"flex",alignItems:"center",gap:"1rem",marginBottom:"1.5rem",flexWrap:"wrap"}}>
        <div style={{flex:1,minWidth:160}}>
          <h2 style={{margin:0,fontFamily:"'Playfair Display',serif",color:"#2d1f3a",fontSize:"1.4rem"}}>Shopping List</h2>
          <div style={{color:"#8a6e9a",fontSize:"0.78rem"}}>{toBuy} to buy{bought>0&&<span> · {bought} bought ✓</span>}</div>
        </div>
        <div style={{position:"relative",flex:1,minWidth:160,maxWidth:260}}>
          <input value={shopSearch} onChange={e=>setShopSearch(e.target.value)} placeholder="Search list…" style={{...inputStyle,paddingLeft:"2rem",fontSize:"0.88rem"}}/>
          <svg style={{position:"absolute",left:"0.65rem",top:"50%",transform:"translateY(-50%)"}} width={13} height={13} viewBox="0 0 24 24" fill="none" stroke="#8a6e9a" strokeWidth="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </div>
        <select value={catFilter} onChange={e=>setCatFilter(e.target.value)} style={{...selectStyle,width:"auto",padding:"0.45rem 0.7rem",fontSize:"0.83rem"}}>
          <option value="">All Categories</option>
          {SHOP_CATS.map(c=><option key={c} value={c}>{c}</option>)}
        </select>
        <label style={{display:"flex",alignItems:"center",gap:"0.4rem",fontFamily:"'Lora',serif",fontSize:"0.82rem",color:"#8a6e9a",cursor:"pointer",whiteSpace:"nowrap"}}>
          <input type="checkbox" checked={showBought} onChange={e=>setShowBought(e.target.checked)} style={{accentColor:"#7c5c8a"}}/> Show bought
        </label>
        <Btn small onClick={()=>setAddingNew(true)}><Icon name="plus" size={13}/>Add Item</Btn>
        {bought>0 && <Btn small variant="ghost" onClick={()=>{ if(window.confirm("Clear all bought items?")) save(shoppingList.filter(x=>!x.bought)); }}>Clear bought</Btn>}
        {toBuyList.length>0 && <Btn small variant="secondary" onClick={shareAsText}><Icon name="share" size={13}/>Text / Share</Btn>}
        {toBuyList.length>0 && <Btn small variant="secondary" onClick={emailList}><Icon name="email" size={13}/>Email List</Btn>}
        {toBuyList.length>0 && <Btn small variant="secondary" onClick={exportPDF}><Icon name="print" size={13}/>Print / PDF</Btn>}
      </div>

      {all.length===0 && !addingNew ? (
        <EmptyState emoji="🛒" title="Shopping list is empty" sub="Add items manually or tap the 🛒 button in your Floss and Fabric stash to add items automatically."/>
      ) : (
        <div style={{borderRadius:"0.75rem",overflow:"hidden",border:"1.5px solid #e2d4e8",boxShadow:"0 2px 10px rgba(100,70,130,0.06)"}}>
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",minWidth:640}}>
              <thead>
                <tr>
                  <th style={{...thS,width:36,cursor:"default"}}>✓</th>
                  <th style={thS}>Item</th>
                  <th style={{...thS,width:130}}>Category</th>
                  <th style={{...thS,width:60}}>Qty</th>
                  <th style={{...thS,width:100}}>Size</th>
                  <th style={thS}>Place to Buy</th>
                  <th style={thS}>Notes</th>
                  <th style={{...thS,width:80,cursor:"default"}}>Actions</th>
                </tr>
              </thead>
              <tbody>
                {addingNew && (
                  <tr style={{background:"#f5eef8"}}>
                    <td style={{...tdS,textAlign:"center"}}><input type="checkbox" disabled style={{accentColor:"#7c5c8a"}}/></td>

                      </select>
                    </td>
                    <td style={tdS}><input style={inpS} value={editRow.notes||""} onChange={e=>setEditRow(p=>({...p,notes:e.target.value}))}/></td>

                      <button onClick={()=>{updateItem({...editRow});setEditingId(null);}} style={{background:"#7c5c8a",color:"#fff",border:"none",borderRadius:"0.35rem",padding:"0.28rem 0.6rem",cursor:"pointer",fontFamily:"'Lora',serif",fontSize:"0.78rem",marginRight:"0.3rem"}}>Save</button>

                    </td>

                ) : (
                  <tr key={x.id} style={{background:x.bought?"#f5f5f5":i%2===0?"#fefcfa":"#faf6ff",opacity:x.bought?0.6:1,transition:"all 0.15s"}}>
                    <td style={{...tdS,textAlign:"center"}}>
                      <input type="checkbox" checked={!!x.bought} onChange={()=>toggleBought(x.id)} style={{accentColor:"#7c5c8a",width:16,height:16,cursor:"pointer"}}/>
                    </td>
                    <td style={{...tdS,fontWeight:600,color:"#2d1f3a",textDecoration:x.bought?"line-through":"none"}}>{x.item||"—"}</td>
                    <td style={tdS}><Badge color={SHOP_CAT_COLOR[x.category]||"#7c5c8a"}>{x.category==="Other"&&x.otherCategory?x.otherCategory:x.category}</Badge></td>
                    <td style={{...tdS,textAlign:"center"}}>{x.quantity||"1"}</td>
                    <td style={{...tdS,color:"#5a4060",fontSize:"0.83rem"}}>{x.size||"—"}</td>
                    <td style={{...tdS,color:"#5a4060"}}>{x.placeToBuy||<span style={{color:"#ccc",fontStyle:"italic"}}>—</span>}</td>
                    <td style={{...tdS,color:"#6a5870",fontStyle:"italic",fontSize:"0.83rem"}}>{x.notes||<span style={{color:"#ccc"}}>—</span>}</td>
                    <td style={{...tdS,whiteSpace:"nowrap"}}>
                      <button onClick={()=>{setEditingId(x.id);setEditRow({...x});setAddingNew(false);}} style={{background:"none",border:"none",cursor:"pointer",color:"#7c5c8a",padding:"0.2rem 0.35rem"}}><Icon name="edit" size={14}/></button>
                      <button onClick={()=>deleteItem(x.id)} style={{background:"none",border:"none",cursor:"pointer",color:"#c0392b",padding:"0.2rem 0.35rem"}}><Icon name="trash" size={14}/></button>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      )}
    </div>
  );
}

function NotionItemCard({ item, onEdit, onDelete, onAddToShop }) {
  const fields = NOTION_FIELDS[item.notionType] || NOTION_FIELDS["_custom"];
  const displayName =
    item.name || item.description || item.colorName ||
    (item.needleSize ? (item.needleSize==="Other" ? item.needleSizeOther : `Size ${item.needleSize}`) : "") ||
    item.pieceType || item.trimType || item.frameType || item.beadType || "";

  const shopItem = () => {
    const label = [item.brand, displayName].filter(Boolean).join(" – ") || item.notionType;
    onAddToShop({ item:label, category:"Notions", quantity:item.quantity||"1",
      size:item.size||item.width||"", placeToBuy:"", notes:"", otherCategory:"", bought:false });
  };

  return (
    <div style={{background:"#fefcfa",border:"1.5px solid #e2d4e8",borderRadius:"0.75rem",padding:"1.1rem",boxShadow:"0 2px 8px rgba(100,70,130,0.07)"}}>

        <div style={{flex:1,fontFamily:"'Playfair Display',serif",fontSize:"1rem",color:"#2d1f3a",fontWeight:600,lineHeight:1.3}}>
          {item.brand
            ? <>{item.brand}{displayName && <span style={{fontWeight:400,color:"#6a5078"}}> — {displayName}</span>}</>
            : displayName || <span style={{color:"#8a6e9a",fontStyle:"italic"}}>Item</span>}
        </div>
        <div style={{display:"flex",gap:"0.25rem",marginLeft:"0.5rem",flexShrink:0}}>
          <button title="Add to Shopping List" onClick={shopItem} style={{background:"none",border:"none",cursor:"pointer",color:"#2e7d32",padding:"2px 4px"}}><Icon name="cart" size={14}/></button>
          <button onClick={()=>onEdit(item)} style={{background:"none",border:"none",cursor:"pointer",color:"#8a6e9a",padding:"2px 4px"}}><Icon name="edit" size={14}/></button>
          <button onClick={()=>onDelete(item.id)} style={{background:"none",border:"none",cursor:"pointer",color:"#c0392b",padding:"2px 4px"}}><Icon name="trash" size={14}/></button>
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0.2rem 0.75rem",marginTop:"0.4rem"}}>
        {fields.filter(k=>k!=="notes"&&k!=="brand"&&k!=="name"&&k!=="description").map(k => {
          let val = item[k]||"";
          if (k==="needleSize") val = item.needleSize==="Other" ? item.needleSizeOther : item.needleSize;
          return val ? (
            <div key={k} style={{fontSize:"0.79rem",fontFamily:"'Lora',serif",color:"#5a4060"}}>
              <span style={{color:"#8a6e9a"}}>{NOTION_LABELS[k]||k}: </span>{val}

          ) : null;

      {item.notes && <div style={{marginTop:"0.6rem",fontSize:"0.79rem",fontFamily:"'Lora',serif",color:"#6a5078",fontStyle:"italic",borderTop:"1px dashed #ddc8ea",paddingTop:"0.5rem"}}>{item.notes}</div>}
    </div>
  );
}

                        {w.priority && <Badge color={priorityColor[w.priority]||"#7c5c8a"}>{w.priority}</Badge>}
                      </div>
                      {w.designer && <div style={{fontSize:"0.82rem",fontFamily:"'Lora',serif",color:"#5a4060"}}><span style={{color:"#8a6e9a"}}>Designer: </span>{w.designer}</div>}
                      {w.price && <div style={{fontSize:"0.82rem",fontFamily:"'Lora',serif",color:"#5a4060"}}><span style={{color:"#8a6e9a"}}>Price: </span>{w.price}</div>}
                      {w.link && <div style={{fontSize:"0.82rem",fontFamily:"'Lora',serif",color:"#5a4060",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}><span style={{color:"#8a6e9a"}}>Where: </span>{w.link}</div>}
                      {w.notes && <div style={{marginTop:"0.6rem",fontSize:"0.82rem",fontFamily:"'Lora',serif",color:"#6a5078",fontStyle:"italic",borderTop:"1px dashed #ddc8ea",paddingTop:"0.5rem"}}>{w.notes}</div>}
                    </div>
                  ))}
                </div>}
          </div>
        )}

        {/* CALCULATOR */}
        {tab==="calculator" && (
          <div style={{maxWidth:680,margin:"0 auto"}}>
            <FabricCalculator/>
          </div>
        )}

      </main>

      {/* Modals */}
      {progressModal && <Modal title={`Progress — ${progressModal.title||"Project"}`} onClose={()=>setProgressModal(null)} wide><ProgressModal p={progressModal} onSave={(updated)=>{ updateItem("projects",updated); setProgressModal({...updated}); }} onClose={()=>setProgressModal(null)}/></Modal>}
      {modal?.type==="project"  && <Modal title={modal.item?"Edit Project":"New Project"} onClose={()=>setModal(null)} wide><ProjectForm initial={modal.item||(modal.preset?{status:modal.preset}:{})} onSave={(f)=>{ if(modal.item?.id){updateItem("projects",{...modal.item,...f});}else{handleSave("projects",f);} setModal(null); }} onClose={()=>setModal(null)}/></Modal>}
      {modal?.type==="designer"  && <Modal title={modal.item?"Edit Designer":"Add Designer"} onClose={()=>setModal(null)}><DesignerForm initial={modal.item} onSave={(f)=>{ if(modal.item?.id){ updateItem("chartDesigners",{...modal.item,...f}); setSelectedDesigner(d=>d&&d.id===modal.item.id?{...d,...f}:d); } else { const nd={...f,id:Math.random().toString(36).slice(2)+Date.now().toString(36),createdAt:new Date().toISOString()}; const d={...data,chartDesigners:[...(data.chartDesigners||[]),nd]}; setData(d); try{localStorage.setItem(STORAGE_KEY,JSON.stringify(d));}catch{} } setModal(null); }} onClose={()=>setModal(null)}/></Modal>}
      {modal?.type==="chart"     && <Modal title={modal.item?"Edit Chart":"Add Chart"} onClose={()=>setModal(null)} wide><ChartForm initial={modal.item} designerName={(data.chartDesigners||[]).find(d=>d.id===(modal.designerId||modal.item?.designerId))?.name||""} onSave={(f)=>{ const uid=()=>Math.random().toString(36).slice(2)+Date.now().toString(36); if(modal.item?.id){ updateChart({...modal.item,...f}); } else { addChart({...f,designerId:modal.designerId,id:uid(),createdAt:new Date().toISOString()}); } setModal(null); }} onClose={()=>setModal(null)}/></Modal>}
      {modal?.type==="fabricCount" && <Modal title={modal.item?"Edit Fabric Count":"Add Fabric Count"} onClose={()=>setModal(null)}><FabricCountForm initial={modal.item} onSave={(f)=>{ if(modal.item?.id){ updateItem("fabricCounts",{...modal.item,...f}); setSelectedCount(c=>c&&c.id===modal.item.id?{...c,...f}:c); } else { const nc={...f,id:Math.random().toString(36).slice(2)+Date.now().toString(36),createdAt:new Date().toISOString()}; const d={...data,fabricCounts:[...(data.fabricCounts||[]),nc]}; setData(d); try{localStorage.setItem(STORAGE_KEY,JSON.stringify(d));}catch{} } setModal(null); }} onClose={()=>setModal(null)}/></Modal>}
      {modal?.type==="brand"    && <Modal title={modal.item?"Edit Brand":"Add Brand"} onClose={()=>setModal(null)}><BrandForm initial={modal.item} onSave={(f)=>{ if(modal.item?.id){updateItem("flossBrands",{...modal.item,...f}); setSelectedBrand(b=>b&&b.id===modal.item.id?{...b,...f}:b);} else { const nb={...f,id:Math.random().toString(36).slice(2)+Date.now().toString(36),createdAt:new Date().toISOString()}; const d={...data,flossBrands:[...(data.flossBrands||[]),nb]}; setData(d); try{localStorage.setItem(STORAGE_KEY,JSON.stringify(d));}catch{} } setModal(null); }} onClose={()=>setModal(null)}/></Modal>}
      {modal?.type==="notionCategory" && <Modal title="Add Category" onClose={()=>setModal(null)}><NotionCategoryForm existingNames={allNotionTypes} onSave={(name,emoji)=>{ addNotionCategory(name,emoji); setModal(null); }} onClose={()=>setModal(null)}/></Modal>}
      {modal?.type==="notion"   && <Modal title={modal.item?`Edit ${modal.item.notionType||"Item"}`:`Add ${modal.notionType||"Item"}`} onClose={()=>setModal(null)} wide><NotionForm initial={modal.item||{}} notionType={modal.notionType||modal.item?.notionType||"Needles"} onSave={(f)=>{ if(modal.item?.id){updateNotion({...modal.item,...f});}else{addNotion({...f,notionType:modal.notionType||f.notionType});} setModal(null); }} onClose={()=>setModal(null)}/></Modal>}
      {modal?.type==="wish"     && <Modal title={modal.item?"Edit Item":"Add to Wish List"} onClose={()=>setModal(null)}><WishlistForm initial={modal.item} onSave={handleSave("wishlist")} onClose={()=>setModal(null)}/></Modal>}

      <footer style={{textAlign:"center",padding:"2rem",color:"#8a6e9a",fontSize:"0.76rem",fontFamily:"'Lora',serif",fontStyle:"italic",borderTop:"1px solid #e2d4e8",marginTop:"2rem"}}>
        StitchKeeper — Made with love for stitchers everywhere 🧵
      </footer>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
    </script>
  </body>
</html>
